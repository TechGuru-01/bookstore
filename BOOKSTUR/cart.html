<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart | BASTE BOOKMART</title>
    <link rel="stylesheet" href="cart-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-text">BASTE BOOKMART</div>
            <nav class="nav-menu">
                <a href="pages/dashboard/dashboard.php">Home</a>
                <a href="pages/library/library.php">Books</a>
                <a href="pages/uniform/uniform.php">Uniforms</a>
                <a href="pages/apparel/apparel.php">Apparel</a>
                <a href="cart.html" class="active">Cart</a>
            </nav>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-overlay"></div>
        <div class="bg-text bg-text-top">Caritas et Scientia</div>
        <div class="bg-text bg-text-bottom">Bienvenidos<br>Bookstore</div>
        
        <div class="cart-box">
            <h1>Your Shopping Cart</h1>
            
            <div class="table-container">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-body">
                        <!-- Example empty state or items -->
                        <tr>
                            <td colspan="6" class="empty-msg">Your cart is empty</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="cart-summary">
                <h2 id="grand-total">Total: P0.00</h2>
                <div class="button-group">
                    <button class="btn btn-clear">Clear Cart</button>
                    <button class="btn btn-checkout" onclick="openModal()">Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        BASTE BOOKMART COPYRIGHT &copy; 2025. ALL RIGHTS RESERVED
    </footer>

    <!-- Simplified Modal from earlier version for functionality -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>Checkout Details</h2>
            <form id="checkoutForm">
                <p>Proceed with your order?</p>
                <button type="button" class="btn btn-checkout" onclick="processOrder()">CONFIRM ORDER</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById("checkoutModal").style.display = "flex"; }
        function closeModal() { document.getElementById("checkoutModal").style.display = "none"; }
        function processOrder() {
            alert("Order Confirmed! Thank you for choosing BASTE BOOKMART.");
            window.location.href = "home.html";
        }
        window.onclick = function(event) {
            let modal = document.getElementById("checkoutModal");
            if (event.target == modal) { closeModal(); }
        }
    </script>

</body>
</html>
